# Stack obrigatória do template: Postgres + FastAPI + Vue/PrimeVue + (opt) OTel
# Use:
#   docker compose up           # ambiente de desenvolvimento
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up
# Tudo em uma rede privada interna; só os ports declarados são expostos.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  backend:
    build:
      context: ./apps/backend
      target: dev
    env_file:
      - ./apps/backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@db:5432/${POSTGRES_DB:-app}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-16chars}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8080"]'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    ports:
      - "127.0.0.1:8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks: [internal]

  frontend:
    build:
      context: ./apps/frontend
      target: dev
    environment:
      VITE_API_PROXY: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./apps/frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    networks: [internal]

volumes:
  db_data:
  frontend_node_modules:

networks:
  internal:
    driver: bridge
