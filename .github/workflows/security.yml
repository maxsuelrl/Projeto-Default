name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # toda segunda 06:00 UTC

# ──────────────────────────────────────────────────────────────────────────
# Convenções deste workflow
# ──────────────────────────────────────────────────────────────────────────
#
# 1. Actions de terceiros são pinadas por SHA imutável (defesa contra
#    supply chain attacks como CVE-2026-33634 do trivy-action).
#    O comentário ao lado de cada SHA registra a versão semântica.
#
# 2. Code scanning (upload de SARIF) é GRÁTIS em repos públicos mas
#    requer GHAS em privados. O upload pode ser desligado pela variável
#    de repositório `ENABLE_CODE_SCANNING_UPLOAD=false` — neste caso o
#    SARIF vira artifact do run.
#
# 3. CodeQL detecta a stack do projeto e só roda análise para linguagens
#    presentes (mesma lógica do ci.yml). Pode ser desligado inteiro com
#    `ENABLE_CODEQL=false`.
# ──────────────────────────────────────────────────────────────────────────

permissions:
  contents: read
  security-events: write

concurrency:
  group: sec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.s.outputs.has-node }}
      has-python: ${{ steps.s.outputs.has-python }}
      has-go: ${{ steps.s.outputs.has-go }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: s
        shell: bash
        # Procura nos lugares da stack obrigatória (apps/{frontend,backend})
        # E também na raiz para projetos legados ou multi-stack.
        run: |
          has_node=false; has_python=false; has_go=false
          if [ -f package.json ] || [ -f apps/frontend/package.json ]; then has_node=true; fi
          if [ -f pyproject.toml ] || [ -f apps/backend/pyproject.toml ] \
             || [ -f requirements.txt ] || [ -f apps/backend/requirements.txt ]; then
            has_python=true
          fi
          if [ -f go.mod ]; then has_go=true; fi
          {
            echo "has-node=$has_node"
            echo "has-python=$has_python"
            echo "has-go=$has_go"
          } >> "$GITHUB_OUTPUT"

  gitleaks:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    # Semgrep precisa de SEMGREP_APP_TOKEN para `semgrep ci`. Sem token,
    # cai para `semgrep scan` (modo offline) com regras públicas.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Semgrep
        run: |
          if [ -n "${SEMGREP_APP_TOKEN}" ]; then
            semgrep ci \
              --config p/owasp-top-ten \
              --config p/security-audit \
              --sarif --output=semgrep.sarif
          else
            semgrep scan \
              --config p/owasp-top-ten \
              --config p/security-audit \
              --sarif --output=semgrep.sarif \
              --error
          fi
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: semgrep.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  trivy-fs:
    name: SCA / IaC — Trivy fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # ⚠️ trivy-action: pinado por SHA do release v0.35.0 (única versão
      # confirmadamente não comprometida pela CVE-2026-33634).
      # Antes desta versão, 76 de 77 tags foram force-push para commits
      # maliciosos em 2026-03-19. Se for atualizar, use SHA de release
      # auditado (não tag).
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 (safe)
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          format: sarif
          output: trivy.sarif
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-sarif
          path: trivy.sarif

  trivy-image:
    name: SCA — Trivy image (backend + frontend)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build image
        run: |
          docker build -t projeto-padrao-${{ matrix.service }}:scan \
            --target prod ./apps/${{ matrix.service }}

      # Scan da nossa imagem inteira (inclui base + deps próprias). Não
      # falha o build em CVE de base — `python:3.12-slim`/`nginx:1.27-alpine`
      # quase sempre têm CVE HIGH "unfixed", o que bloquearia todo PR
      # legítimo. Marcamos exit-code=0 e publicamos em SARIF para
      # acompanhamento na aba Security.
      - name: Trivy — visibility (não bloqueia)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 (safe)
        with:
          scan-type: image
          image-ref: projeto-padrao-${{ matrix.service }}:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      # Já o **gate** que **falha** o PR escaneia só os pacotes que
      # adicionamos (vuln-type=library): nossas dependências precisam
      # estar limpas. CVE de SO fica como sinal, não trava.
      - name: Trivy — gate (libs próprias)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 (safe)
        with:
          scan-type: image
          image-ref: projeto-padrao-${{ matrix.service }}:scan
          severity: HIGH,CRITICAL
          vuln-type: library
          ignore-unfixed: true
          exit-code: "1"

  # CodeQL com detecção de stack — só roda análise para linguagens presentes
  # no projeto, evitando "autobuild" desnecessário em repos só-frontend, etc.
  codeql-javascript:
    name: SAST — CodeQL (JS/TS)
    needs: detect
    if: needs.detect.outputs.has-node == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  codeql-python:
    name: SAST — CodeQL (Python)
    needs: detect
    if: needs.detect.outputs.has-python == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with: { languages: python }
      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  codeql-go:
    name: SAST — CodeQL (Go)
    needs: detect
    if: needs.detect.outputs.has-go == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with: { languages: go }
      - uses: github/codeql-action/autobuild@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
      - uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2

  zap-baseline:
    name: DAST — ZAP baseline (staging)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: ZAP Baseline
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ vars.STAGING_URL || 'https://example.com' }}
          fail_action: true
