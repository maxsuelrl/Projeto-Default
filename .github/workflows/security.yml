name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # toda segunda 06:00 UTC

# ──────────────────────────────────────────────────────────────────────────
# Convenções deste workflow
# ──────────────────────────────────────────────────────────────────────────
#
# 1. Actions de terceiros são pinadas por SHA imutável (defesa contra
#    supply chain attacks como CVE-2026-33634 do trivy-action).
#    O comentário ao lado de cada SHA registra a versão semântica.
#
# 2. Code scanning (upload de SARIF) é GRÁTIS em repos públicos mas
#    requer GHAS em privados. O upload pode ser desligado pela variável
#    de repositório `ENABLE_CODE_SCANNING_UPLOAD=false` — neste caso o
#    SARIF vira artifact do run.
#
# 3. CodeQL detecta a stack do projeto e só roda análise para linguagens
#    presentes (mesma lógica do ci.yml). Pode ser desligado inteiro com
#    `ENABLE_CODEQL=false`.
# ──────────────────────────────────────────────────────────────────────────

permissions:
  contents: read
  security-events: write

concurrency:
  group: sec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.s.outputs.has-node }}
      has-python: ${{ steps.s.outputs.has-python }}
      has-go: ${{ steps.s.outputs.has-go }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: s
        shell: bash
        run: |
          echo "has-node=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-python=$([ -f pyproject.toml ] || [ -f requirements.txt ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-go=$([ -f go.mod ] && echo true || echo false)" >> $GITHUB_OUTPUT

  gitleaks:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif --output=semgrep.sarif \
            --error
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: semgrep.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  trivy-fs:
    name: SCA / IaC — Trivy fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # ⚠️ trivy-action: pinado por SHA do release v0.35.0 (única versão
      # confirmadamente não comprometida pela CVE-2026-33634).
      # Antes desta versão, 76 de 77 tags foram force-push para commits
      # maliciosos em 2026-03-19. Se for atualizar, use SHA de release
      # auditado (não tag).
      - uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0 (safe)
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy.sarif
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: trivy.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-sarif
          path: trivy.sarif

  # CodeQL com detecção de stack — só roda análise para linguagens presentes
  # no projeto, evitando "autobuild" desnecessário em repos só-frontend, etc.
  codeql-javascript:
    name: SAST — CodeQL (JS/TS)
    needs: detect
    if: needs.detect.outputs.has-node == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with: { languages: javascript-typescript }
      - uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4

  codeql-python:
    name: SAST — CodeQL (Python)
    needs: detect
    if: needs.detect.outputs.has-python == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with: { languages: python }
      - uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4

  codeql-go:
    name: SAST — CodeQL (Go)
    needs: detect
    if: needs.detect.outputs.has-go == 'true' && vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: github/codeql-action/init@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with: { languages: go }
      - uses: github/codeql-action/autobuild@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
      - uses: github/codeql-action/analyze@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4

  zap-baseline:
    name: DAST — ZAP baseline (staging)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ZAP Baseline
        uses: zaproxy/action-baseline@5e036a7e8ec73d1b9072c930d0b7375e96e99a0d # v0.14.0
        with:
          target: ${{ vars.STAGING_URL || 'https://example.com' }}
          fail_action: true
