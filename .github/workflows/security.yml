name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # toda segunda 06:00 UTC

# Variável que controla o upload de SARIF para a aba "Security → Code scanning".
#
# Code scanning é GRÁTIS em repositórios PÚBLICOS, mas requer GitHub Advanced
# Security (GHAS, pago) em repositórios PRIVADOS. Por padrão, este template
# deixa o upload LIGADO; se o repo não tiver permissão (ex.: privado sem
# GHAS), defina a variável de repositório `ENABLE_CODE_SCANNING_UPLOAD=false`
# em Settings → Secrets and variables → Actions → Variables.
#
# Mesmo com o upload desligado, os scans continuam rodando e o CI continua
# quebrando o PR em findings High/Critical — apenas o report visual fica
# como artifact em vez de aparecer na aba Security.

permissions:
  contents: read
  security-events: write

concurrency:
  group: sec-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  semgrep:
    name: SAST — Semgrep
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: |
          semgrep ci \
            --config p/owasp-top-ten \
            --config p/security-audit \
            --sarif --output=semgrep.sarif \
            --error
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  trivy-fs:
    name: SCA / IaC — Trivy fs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy.sarif
      - name: Upload SARIF (aba Security)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD != 'false'
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
      - name: Upload SARIF (artifact, fallback)
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif
          path: trivy.sarif

  # CodeQL é grátis em repositórios PÚBLICOS. Em repositórios PRIVADOS
  # depende de GHAS. Para desligar, defina a variável de repositório
  # `ENABLE_CODEQL=false`.
  codeql:
    name: SAST — CodeQL
    if: vars.ENABLE_CODEQL != 'false'
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python", "go"]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: { languages: ${{ matrix.language }} }
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  zap-baseline:
    name: DAST — ZAP baseline (staging)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: ${{ vars.STAGING_URL || 'https://example.com' }}
          fail_action: true
