name: CI

# Actions são pinadas por SHA (defesa contra supply chain — ver
# .github/workflows/security.yml para o racional).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.s.outputs.has-node }}
      has-python: ${{ steps.s.outputs.has-python }}
      has-go: ${{ steps.s.outputs.has-go }}
      has-playwright: ${{ steps.s.outputs.has-playwright }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: s
        shell: bash
        run: |
          echo "has-node=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-python=$([ -f pyproject.toml ] || [ -f requirements.txt ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-go=$([ -f go.mod ] && echo true || echo false)" >> $GITHUB_OUTPUT
          if ls playwright.config.* >/dev/null 2>&1; then
            echo "has-playwright=true" >> $GITHUB_OUTPUT
          else
            echo "has-playwright=false" >> $GITHUB_OUTPUT
          fi

  lint-test-node:
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    name: Node — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present -- --coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-node
          path: coverage/

  lint-test-python:
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -U pip
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install . ; fi
          pip install ruff pytest pytest-cov
      - run: ruff check .
      - run: pytest --cov --cov-report=xml --cov-report=term

  lint-test-go:
    needs: detect
    if: needs.detect.outputs.has-go == 'true'
    name: Go — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with: { go-version: "stable" }
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

  e2e-playwright:
    needs: detect
    if: needs.detect.outputs.has-node == 'true' && needs.detect.outputs.has-playwright == 'true'
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with: { name: playwright-report, path: playwright-report }
