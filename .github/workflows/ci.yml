name: CI

# Actions são pinadas por SHA (defesa contra supply chain — ver
# .github/workflows/security.yml para o racional).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.s.outputs.has-node }}
      has-python: ${{ steps.s.outputs.has-python }}
      has-go: ${{ steps.s.outputs.has-go }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - id: s
        shell: bash
        run: |
          echo "has-node=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-python=$([ -f pyproject.toml ] || [ -f requirements.txt ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-go=$([ -f go.mod ] && echo true || echo false)" >> $GITHUB_OUTPUT

  lint-test-node:
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    name: Node — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present -- --coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: coverage-node
          path: coverage/

  lint-test-python:
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -U pip
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install . ; fi
          pip install ruff pytest pytest-cov
      - run: ruff check .
      - run: pytest --cov --cov-report=xml --cov-report=term

  lint-test-go:
    needs: detect
    if: needs.detect.outputs.has-go == 'true'
    name: Go — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with: { go-version: "stable" }
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

  e2e-playwright:
    needs: detect
    if: needs.detect.outputs.has-node == 'true' && hashFiles('playwright.config.*') != ''
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with: { name: playwright-report, path: playwright-report }
