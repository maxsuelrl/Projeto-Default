name: CI

# Stack obrigatória do template:
#   apps/backend  → FastAPI + Postgres + SQLAlchemy + Alembic
#   apps/frontend → Vue 3 + PrimeVue + Vite + TypeScript
# Actions pinadas por SHA — ver .github/workflows/security.yml.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — FastAPI lint + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
          JWT_SECRET: ci-secret-min-16-chars-changeme
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-backend
          path: apps/backend/coverage.xml

  frontend:
    name: Frontend — Vue/PrimeVue lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: "22", cache: "npm", cache-dependency-path: apps/frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: dist-frontend
          path: apps/frontend/dist

  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: docker build -t projeto-padrao-backend:ci --target prod ./apps/backend
      - run: docker build -t projeto-padrao-frontend:ci --target prod ./apps/frontend
