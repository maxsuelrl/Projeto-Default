name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detectar stack
    runs-on: ubuntu-latest
    outputs:
      has-node: ${{ steps.s.outputs.has-node }}
      has-python: ${{ steps.s.outputs.has-python }}
      has-go: ${{ steps.s.outputs.has-go }}
    steps:
      - uses: actions/checkout@v4
      - id: s
        shell: bash
        run: |
          echo "has-node=$([ -f package.json ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-python=$([ -f pyproject.toml ] || [ -f requirements.txt ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "has-go=$([ -f go.mod ] && echo true || echo false)" >> $GITHUB_OUTPUT

  lint-test-node:
    needs: detect
    if: needs.detect.outputs.has-node == 'true'
    name: Node — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run typecheck --if-present
      - run: npm test --if-present -- --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-node
          path: coverage/

  lint-test-python:
    needs: detect
    if: needs.detect.outputs.has-python == 'true'
    name: Python — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: "pip" }
      - run: pip install -U pip
      - run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]" || pip install . ; fi
          pip install ruff pytest pytest-cov
      - run: ruff check .
      - run: pytest --cov --cov-report=xml --cov-report=term

  lint-test-go:
    needs: detect
    if: needs.detect.outputs.has-go == 'true'
    name: Go — lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "stable" }
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.out ./...

  e2e-playwright:
    needs: detect
    if: needs.detect.outputs.has-node == 'true' && hashFiles('playwright.config.*') != ''
    name: E2E — Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: playwright-report, path: playwright-report }
