name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Usa um PAT (RELEASE_PLEASE_TOKEN) se existir; senão cai no GITHUB_TOKEN.
      # GITHUB_TOKEN só funciona se o repo tiver:
      #   Settings → Actions → General → Workflow permissions
      #   "Allow GitHub Actions to create and approve pull requests" ATIVADO.
      # Caso contrário, crie um PAT (fine-grained: contents=write, pull-requests=write)
      # e salve como secret RELEASE_PLEASE_TOKEN.
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
